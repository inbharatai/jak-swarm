name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @jak-swarm/db exec prisma generate

      - name: Build all packages (dependency order)
        run: |
          pnpm --filter @jak-swarm/shared build
          pnpm --filter @jak-swarm/industry-packs build
          pnpm --filter @jak-swarm/verification build
          pnpm --filter @jak-swarm/tools build
          pnpm --filter @jak-swarm/agents build
          pnpm --filter @jak-swarm/swarm build

      - name: Build web app
        run: pnpm --filter @jak-swarm/web exec next build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_key

  test:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: jakswarm
          POSTGRES_PASSWORD: jakswarm
          POSTGRES_DB: jakswarm
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U jakswarm"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @jak-swarm/db exec prisma generate

      - name: Apply database migrations
        run: pnpm --filter @jak-swarm/db db:migrate:deploy
        env:
          DATABASE_URL: postgresql://jakswarm:jakswarm@localhost:5432/jakswarm
          DIRECT_URL: postgresql://jakswarm:jakswarm@localhost:5432/jakswarm

      - name: Build packages (dependency order)
        run: |
          pnpm --filter @jak-swarm/shared build
          pnpm --filter @jak-swarm/industry-packs build
          pnpm --filter @jak-swarm/verification build
          pnpm --filter @jak-swarm/tools build
          pnpm --filter @jak-swarm/agents build

      - name: Run tests
        run: pnpm test
        env:
          NODE_ENV: test
          AUTH_SECRET: ci-test-secret-change-me
          DATABASE_URL: postgresql://jakswarm:jakswarm@localhost:5432/jakswarm
          DIRECT_URL: postgresql://jakswarm:jakswarm@localhost:5432/jakswarm
          REDIS_URL: redis://localhost:6379
