name: Runtime Benchmark (manual / OpenAI key required)

# This workflow is INTENTIONALLY manual-only (workflow_dispatch). It hits the
# real OpenAI API and would cost ~$0.05 per run. Triggering it on every PR
# would be wasteful and would block PRs from external contributors who don't
# have access to the OPENAI_API_KEY GitHub secret.
#
# To run:
#   gh workflow run bench-runtime.yml
# or via the GitHub UI: Actions → "Runtime Benchmark" → Run workflow.
#
# Required GitHub repository secret:
#   OPENAI_API_KEY — service-role key with at least $0.10 of credit.
#
# Output:
#   - Markdown report uploaded as a workflow artifact
#   - JSON report uploaded as a workflow artifact
#   - Job summary printed to the workflow run page

on:
  workflow_dispatch:
    inputs:
      mode:
        description: 'Scenario set to run'
        type: choice
        required: true
        default: 'hardening-pass'
        options:
          - hardening-pass
          - persona-core

concurrency:
  group: bench-runtime-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bench:
    name: Run benchmark scenarios
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma Client
        run: pnpm --filter @jak-swarm/db exec prisma generate

      - name: Build dependency packages
        run: |
          pnpm --filter @jak-swarm/shared build
          pnpm --filter @jak-swarm/industry-packs build
          pnpm --filter @jak-swarm/verification build
          pnpm --filter @jak-swarm/db build
          pnpm --filter @jak-swarm/tools build
          pnpm --filter @jak-swarm/agents build
          pnpm --filter @jak-swarm/swarm build

      - name: Verify OPENAI_API_KEY is set + mask
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          # Belt-and-suspenders: GitHub Actions auto-masks values pulled
          # from `secrets.*`, but the explicit ::add-mask:: ensures any
          # downstream string formatting (length checks, hashes) doesn't
          # accidentally leak the value via stderr or step summaries.
          if [ -z "$OPENAI_API_KEY" ]; then
            echo "::error::OPENAI_API_KEY secret is not configured. Add it under repo Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "::add-mask::$OPENAI_API_KEY"
          # Print presence + length only — never the value.
          echo "OPENAI_API_KEY: SET (len=${#OPENAI_API_KEY})"

      - name: Run benchmark (quota-aware)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Default OPENAI_BASE_URL is fine; only set if user has a custom proxy
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
        # Honest exit-code handling. The bench CLI exits:
        #   0 — every scenario passed
        #   1 — at least one REAL failure (model behaviour / wiring)
        #   2 — only quota / rate-limit failures (blocked, not failed)
        # We bubble exit 0 + 1 directly. Exit 2 ("blocked") is reported as
        # a warning + a neutral conclusion so the workflow isn't a red ❌
        # for an external billing condition the operator must fix offline.
        run: |
          set +e
          if [ "${{ inputs.mode }}" = "persona-core" ]; then
            pnpm bench:runtime -- --core
          else
            pnpm bench:runtime
          fi
          status=$?
          set -e
          echo "BENCH_EXIT_CODE=$status" >> $GITHUB_ENV
          if [ "$status" = "0" ]; then
            echo "::notice::Benchmark passed all scenarios."
          elif [ "$status" = "1" ]; then
            echo "::error::Benchmark had REAL failures (not quota/rate-limit). See artifact + job log."
            exit 1
          elif [ "$status" = "2" ]; then
            echo "::warning::Benchmark BLOCKED on OpenAI quota / rate-limit. Top up at platform.openai.com/billing."
            # Don't fail the workflow — this is an external condition, not a regression.
          else
            echo "::error::Benchmark exited with unexpected code $status."
            exit "$status"
          fi

      - name: Upload Markdown report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-md
          path: qa/benchmark-results-openai-first.md
          if-no-files-found: error

      - name: Upload JSON report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results-json
          path: qa/_generated/bench-runtime.json
          if-no-files-found: warn

      - name: Summarise to workflow run page
        if: always()
        run: |
          if [ -f qa/benchmark-results-openai-first.md ]; then
            echo "## Benchmark results (exit code: $BENCH_EXIT_CODE)" >> $GITHUB_STEP_SUMMARY
            head -60 qa/benchmark-results-openai-first.md >> $GITHUB_STEP_SUMMARY
          else
            echo "::warning::No benchmark report produced — check job logs."
          fi
