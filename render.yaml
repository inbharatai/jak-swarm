# Render Blueprint — JAK Swarm (API + Worker + Grafana Agent)
# https://render.com/docs/blueprint-spec
#
# Production topology for JAK Swarm on Render:
#   • jak-swarm-api         (web, public)   — HTTP/SSE/auth/enqueue
#   • jak-swarm-worker      (pserv, private) — durable queue consumer
#   • jak-swarm-grafana-agent (pserv, private) — scrapes both → Grafana Cloud
#
# Frontend is on Vercel (apps/web), not Render.
# State is on Supabase Postgres (DATABASE_URL + DIRECT_URL) and Upstash Redis
# (rediss:// URL). Both services share the same DB + Redis.
#
# ────────────────────────────────────────────────────────────────────────────
# Rollout order (see docs/DEPLOYMENT.md for the full runbook):
#   1. Rotate all chat-leaked credentials (Supabase service_role, Render API
#      key, Upstash credential).
#   2. Apply this blueprint (creates jak-swarm-worker + jak-swarm-grafana-agent
#      if not already present; updates env on jak-swarm-api).
#   3. Set secrets in Render dashboard for every `sync: false` entry below.
#   4. Watch worker logs — "Queue worker started — instance=jak-swarm-worker".
#   5. Confirm API logs show "Queue worker disabled in API process
#      (standalone mode expected)" — proves the split is live.
#
# Required secrets (set in Render dashboard — sync: false entries):
#   DATABASE_URL, DIRECT_URL, AUTH_SECRET, REDIS_URL,
#   OPENAI_API_KEY, ANTHROPIC_API_KEY (and whichever other LLM keys you use),
#   NEXT_PUBLIC_SUPABASE_URL, NEXT_PUBLIC_SUPABASE_ANON_KEY,
#   GRAFANA_CLOUD_PROM_URL, GRAFANA_CLOUD_PROM_USER, GRAFANA_CLOUD_PROM_API_KEY
# ────────────────────────────────────────────────────────────────────────────

services:
  # ────────────────────────────────────────────────────────────────────
  # API service — handles HTTP routes, SSE, auth, enqueue.
  # NEVER runs the queue worker in this blueprint (WORKFLOW_WORKER_MODE
  # is hard-set to 'standalone'). If you deploy this blueprint without
  # the worker service, the queue will stop draining.
  # ────────────────────────────────────────────────────────────────────
  - type: web
    name: jak-swarm-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: API_PORT
        value: "4000"
      - key: LOG_LEVEL
        value: warn
      - key: CORS_ORIGINS
        # comma-separated, NO spaces after commas — config.ts splits raw
        value: https://jakswarm.com,https://www.jakswarm.com
      # Queue-worker role is OFF in API. The separate jak-swarm-worker
      # service below owns all queue claims.
      - key: WORKFLOW_WORKER_MODE
        value: standalone
      # Fail fast if REDIS_URL is missing in prod — prevents silently
      # falling back to in-memory coordination.
      - key: REQUIRE_REDIS_IN_PROD
        value: "true"
      # Secrets — paste in Render dashboard:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false

  # ────────────────────────────────────────────────────────────────────
  # Worker service — consumes the durable queue, runs agent workflows,
  # handles pause/resume/stop signals. Exposes /metrics, /healthz, /ready
  # on WORKER_METRICS_PORT so the Grafana Agent can scrape it.
  #
  # Private service (pserv): reachable only by other Render services in
  # this project. Not on the public internet. This is deliberate —
  # metrics + healthcheck endpoints are not auth-protected, so exposing
  # them publicly would leak operational telemetry.
  # ────────────────────────────────────────────────────────────────────
  - type: pserv
    name: jak-swarm-worker
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    # Override default CMD (which runs the API). WORKDIR in Dockerfile is
    # /app; worker build output is /app/apps/api/dist/worker-entry.js.
    dockerCommand: "node apps/api/dist/worker-entry.js"
    region: oregon
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: LOG_LEVEL
        value: info
      # Stable identity per service — reclaim logs correlate with
      # the right instance. RENDER_SERVICE_NAME is auto-populated.
      # Upgrade to $RENDER_INSTANCE_ID if you scale to multiple replicas.
      - key: WORKFLOW_WORKER_INSTANCE_ID
        value: "$RENDER_SERVICE_NAME"
      - key: WORKFLOW_QUEUE_CONCURRENCY
        value: "2"
      - key: WORKFLOW_QUEUE_POLL_INTERVAL_MS
        value: "1000"
      - key: WORKFLOW_QUEUE_LEASE_TTL_MS
        value: "60000"
      - key: WORKER_METRICS_PORT
        value: "9464"
      - key: REQUIRE_REDIS_IN_PROD
        value: "true"
      # Same DB + Redis as API:
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: REDIS_URL
        sync: false
      # AUTH_SECRET MUST match the API's generated value — paste it
      # from the API service's env into the worker env.
      - key: AUTH_SECRET
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false

  # ────────────────────────────────────────────────────────────────────
  # OPTIONAL: Grafana Agent — scrapes API + Worker /metrics and
  # remote_writes to Grafana Cloud's hosted Prometheus.
  #
  # NOT part of the default production deploy — it costs $7/mo and isn't
  # worth that until you have real user load. Render's built-in logs +
  # service-down email alerts cover the critical failure modes.
  #
  # When to enable (uncomment + re-apply blueprint):
  #   - >50 paying users OR >500 workflows/day
  #   - You need alert-driven paging (queue backlog, LLM cost spikes,
  #     worker-down beyond 120s)
  #   - You want a unified metrics dashboard across API + Worker
  #
  # When enabled, requires (set in Render dashboard as secrets):
  #   GRAFANA_CLOUD_PROM_URL       — from Grafana Cloud → Connections → Prometheus → "Send Metrics"
  #   GRAFANA_CLOUD_PROM_USER      — numeric user id on same page
  #   GRAFANA_CLOUD_PROM_API_KEY   — access policy token with metrics:write
  #
  # Config files are committed at ops/grafana-agent/{agent.yaml,Dockerfile}
  # so re-enabling is a single uncomment + re-apply.
  # ────────────────────────────────────────────────────────────────────
  # - type: pserv
  #   name: jak-swarm-grafana-agent
  #   runtime: docker
  #   dockerfilePath: ./ops/grafana-agent/Dockerfile
  #   dockerContext: .
  #   region: oregon
  #   plan: starter
  #   envVars:
  #     - key: GRAFANA_CLOUD_PROM_URL
  #       sync: false
  #     - key: GRAFANA_CLOUD_PROM_USER
  #       sync: false
  #     - key: GRAFANA_CLOUD_PROM_API_KEY
  #       sync: false
